<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>about:blank AI Launcher – UV /sw/ prefix</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;background:#111;color:#eee;margin:0;text-align:center;padding:20px}
  h1{margin-top:0;font-size:1.9rem}
  button{background:#333;color:#fff;border:0;border-radius:6px;padding:8px 14px;margin:4px 6px;font-size:1rem;cursor:pointer}
  button:hover{background:#4a4a4a}
  .section{margin-top:28px}
  input[type=text]{padding:6px 8px;border-radius:4px;border:1px solid #666;width:50%;min-width:260px}
  iframe{border:0;width:100%;height:100%}
</style>

<!-- Ultraviolet scripts -->
<script src="https://cdn.jsdelivr.net/gh/titaniumnetwork-dev/Ultraviolet/uv.bundle.js"></script>
<script src="./uv.config.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./uv.sw.js', { scope: '/' })
    .catch(err => console.warn('Service worker registration failed. Make sure to host over HTTP/HTTPS with uv.sw.js present.', err));
}
</script>
</head>
<body>
<h1>about:blank AI Launcher – custom /sw/ prefix</h1>
<p>Uses Ultraviolet proxy so sites load <em>inside</em> an about:blank iframe.<br>
Make sure this page, <code>uv.bundle.js</code>, <code>uv.config.js</code>, and <code>uv.sw.js</code> are served from the same origin (e.g., http://localhost:8080).</p>

<div>
  <button onclick="openViaUV('https://notegpt.io/ai-chat')">NoteGPT</button>
  <button onclick="openViaUV('https://gemini.google.com/app')">Gemini</button>
  <button onclick="openViaUV('https://chatgpt.com')">ChatGPT</button>
  <button onclick="openViaUV('https://claude.ai/new')">Claude</button>
</div>

<div class="section">
  <h2>Open any URL via UV</h2>
  <input id="urlInput" type="text" placeholder="https://example.com">
  <button onclick="manual()">Open</button>
</div>

<script>
function shell(win,title){
  win.document.write(`<!DOCTYPE html><html><head><title>${title}</title>
  <style>html,body{margin:0;height:100%;background:#000;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center}
  iframe{border:0;width:100%;height:100%;}</style></head><body>Loading…</body></html>`);
  win.document.close();
}

function openViaUV(url){
  if(typeof __uv$config==='undefined'||typeof __uv$config.encodeUrl!=='function'){
    alert('Ultraviolet not ready. Ensure uv.bundle.js and uv.config.js are both loading.');
    return;
  }
  const encoded=__uv$config.encodeUrl(url);
  const path=__uv$config.prefix + encoded;
  const w=window.open('about:blank','_blank');
  if(!w){alert('Popup blocked');return;}
  shell(w,'UV '+url);
  const ifr=w.document.createElement('iframe');
  ifr.src=path;
  w.document.body.innerHTML='';
  w.document.body.appendChild(ifr);
}

function manual(){
  const raw=document.getElementById('urlInput').value.trim();
  if(!raw){alert('Enter a URL');return;}
  const full=/^https?:\/\//i.test(raw)?raw:'https://'+raw;
  openViaUV(full);
}
</script>
</body>
</html>
